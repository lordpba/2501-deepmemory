<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2501 DeepMemory</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css?v=4">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-left">
      <span class="logo">2501</span>
      <span class="logo-sub">DeepMemory v1.1.0</span>
    </div>
    <div class="header-right">
      <span class="ghost-indicator" id="ghostIndicator">
        <span class="ghost-dot" id="ghostDot"></span>
        <span id="ghostName">Ghost</span>
      </span>
      <select id="modelSelect" title="Active model"></select>
      <button id="configBtn" class="icon-btn" title="Settings">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main layout -->
  <main>

    <!-- LEFT: Chat panel -->
    <section class="panel chat-panel">
      <div class="messages" id="messages">
        <div class="message assistant welcome">
          <div class="msg-content" id="welcomeMsg">
            Connecting to your Ghost...
          </div>
        </div>
      </div>

      <!-- Input area -->
      <div class="input-area">
        <!-- Attachment preview -->
        <div class="attachments" id="attachments"></div>

        <div class="input-row">
          <label class="attach-btn" title="Attach file or image">
            <input type="file" id="fileInput" accept=".pdf,.txt,.md,.docx,.png,.jpg,.jpeg,.webp" hidden>
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </label>
          <button id="captureBtn" class="attach-btn" title="Capture Screen" style="border:none;background:transparent;cursor:pointer;color:var(--text-dim);display:flex;align-items:center;justify-content:center;">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
              <line x1="8" y1="21" x2="16" y2="21"></line>
              <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
          </button>
          <textarea
            id="userInput"
            placeholder="Talk to your Ghost..."
            rows="1"
            autofocus
          ></textarea>
          <button id="sendBtn" title="Send">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </section>

    <!-- DIVIDER -->
    <div class="divider"></div>

    <!-- RIGHT: Ghost viewer panel -->
    <section class="panel ghost-panel">
      <div class="ghost-header">
        <span class="ghost-title">Ghost</span>
        <div class="ghost-tabs">
          <button class="tab" id="tabRaw" onclick="switchTab('raw')">Raw</button>
          <button class="tab active" id="tabList" onclick="switchTab('list')">Pages</button>
          <button class="tab" id="tabGraph" onclick="switchTab('graph')">Graph</button>
          <button class="tab" id="tabPage" onclick="switchTab('page')" style="display:none">View</button>
        </div>
        <input type="search" id="pageSearch" placeholder="Search..." oninput="filterPages()">
      </div>

      <!-- Raw files view -->
      <div id="viewRaw" class="ghost-view" style="display:none; padding: 10px;">
        <div style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
          <span style="font-size: 12px; color: var(--text-dim);">Unprocessed sources</span>
          <label class="btn" style="cursor:pointer; padding: 4px 8px; font-size: 11px;">
            Upload
            <input type="file" id="rawUploadInput" style="display:none;" multiple>
          </label>
        </div>
        <div id="rawList" class="page-list"></div>
      </div>

      <!-- Pages list view -->
      <div id="viewList" class="ghost-view">
        <div id="pageList" class="page-list">
          <div class="page-list-empty">No pages yet — start a conversation.</div>
        </div>
      </div>

      <!-- Single page view -->
      <div id="viewPage" class="ghost-view" style="display:none">
        <div class="page-toolbar">
          <button onclick="switchTab('list')" class="back-btn">← Back</button>
          <span id="currentPageName" class="current-page-name"></span>
          <div style="display: flex; gap: 8px;">
            <button onclick="deletePage()" id="deleteBtn" class="edit-btn" style="color: #ef4444; border-color: rgba(239, 68, 68, 0.2);">Delete</button>
            <button onclick="toggleEdit()" id="editBtn" class="edit-btn">Edit</button>
          </div>
        </div>
        <div id="pageContent" class="page-content markdown-body"></div>
        <textarea id="pageEditor" class="page-editor" style="display:none"></textarea>
        <div class="editor-actions" id="editorActions" style="display:none">
          <button onclick="savePage()">Save</button>
          <button onclick="toggleEdit()">Cancel</button>
        </div>
      </div>

      <!-- Graph view -->
      <div id="viewGraph" class="ghost-view" style="display:none; padding: 0; overflow: hidden;">
        <div id="graphContainer" class="graph-container"></div>
      </div>
    </section>

  </main>

  <!-- Activity bar -->
  <footer>
    <div class="activity-bar" id="activityBar">
      <span class="activity-icon" id="activityIcon">○</span>
      <span id="activityText">Ready</span>
    </div>
  </footer>

  <!-- Config Modal -->
  <div id="configModal" class="modal">
    <div class="modal-content">
      <h2>LLM Configuration</h2>
      <div class="form-group">
        <label>Provider</label>
        <select id="configProvider">
          <option value="ollama">Ollama (Local/LAN)</option>
          <option value="openai">OpenAI</option>
          <option value="gemini">Google Gemini</option>
          <option value="claude">Anthropic Claude</option>
        </select>
      </div>

      <div id="ollamaFields">
        <div class="form-group">
          <label>Ollama Endpoint</label>
          <input type="text" id="configOllamaBase" placeholder="http://localhost:11434">
        </div>
      </div>

      <div id="apiFields" style="display:none">
        <div class="form-group">
          <label>API Key</label>
          <input type="password" id="configApiKey" placeholder="sk-...">
        </div>
      </div>

      <div class="form-group" style="margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border);">
        <label>Agent Tools</label>
        <div class="form-group" style="margin-top: 8px;">
          <label>Serper.dev API Key (Optional)</label>
          <input type="password" id="configSerperKey" placeholder="For web search...">
        </div>
      </div>

      <div class="form-group" style="margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border);">
        <label>Maintenance</label>
        <button id="organizeWikiBtn" onclick="organizeWiki()" class="edit-btn" style="width: 100%; display: flex; justify-content: center; margin-top: 8px;">Organize Wiki Folders</button>
      </div>

      <div class="modal-actions">
        <button onclick="saveConfig()" class="primary-btn">Save & Refresh</button>
        <button onclick="closeModal('configModal')">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=10"></script>
</body>
</html>
